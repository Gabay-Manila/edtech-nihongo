<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdTech Gabay - NIHONGO サバイバル</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       EdTech Gabay - UIスタイル定義
       ロジック・データは一切記載しない。見た目だけ。
       ============================================================ */
    :root {
      --primary-blue:       #1e3a8a;
      --primary-blue-light: #eff6ff;
      --accent-red:         #ef4444;
      --text-dark:          #1e293b;
      --radius-round:       20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Zen Maru Gothic', sans-serif; }

    body {
      background-color: #f8fafc;
      color: var(--text-dark);
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-container {
      width: 100%;
      max-width: 500px;
      background: white;
      border-radius: var(--radius-round);
      box-shadow: 0 10px 25px rgba(30, 58, 138, 0.05);
      padding: 20px;
      border: 2px solid var(--primary-blue-light);
    }

    /* ロゴ */
    .logo-area {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    /* 言語セレクター */
    .lang-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .lang-btn {
      border: 2px solid var(--primary-blue);
      background: white;
      color: var(--primary-blue);
      padding: 10px 4px;
      font-size: 14px;
      font-weight: 700;
      border-radius: var(--radius-round);
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }
    .lang-btn.active {
      background: var(--primary-blue);
      color: white;
    }

    /* レッスンピッカー */
    .lesson-selector-box { margin-bottom: 20px; }
    select {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-weight: 700;
      color: var(--primary-blue);
      border: 2px solid var(--primary-blue);
      border-radius: var(--radius-round);
      background-color: white;
    }

    /* クイズカード */
    .quiz-card {
      background: var(--primary-blue-light);
      border-radius: var(--radius-round);
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #dbeafe;
    }
    .question-title {
      font-size: 17px;
      font-weight: 900;
      color: var(--primary-blue);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .audio-trigger-btn {
      background: var(--accent-red);
      color: white;
      border: none;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      display: block;
      margin: 0 auto 16px;
      box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
    }

    /* 選択肢ボタン */
    .options-list { display: flex; flex-direction: column; gap: 12px; }
    .option-btn {
      width: 100%;
      background: white;
      border: 2px solid #cbd5e1;
      padding: 14px 16px;
      text-align: left;
      font-size: 15px;
      font-weight: 700;
      border-radius: var(--radius-round);
      cursor: pointer;
      transition: all 0.2s ease;
      color: var(--text-dark);
      line-height: 1.4;
    }

    /* ひらがなグリッド */
    .hiragana-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 16px;
    }
    .kana-btn {
      background: white;
      border: 2px solid var(--primary-blue-light);
      padding: 10px 0;
      font-size: 18px;
      font-weight: 700;
      border-radius: 12px;
      color: var(--primary-blue);
      cursor: pointer;
      text-align: center;
    }
    .kana-btn:active { background: var(--primary-blue); color: white; }

    /* クリア演出 */
    .congrats-card {
      background: #bbf7d0;
      color: #166534;
      border: 2px solid #22c55e;
      padding: 20px;
      border-radius: var(--radius-round);
      text-align: center;
      font-weight: 900;
      font-size: 18px;
      margin-bottom: 20px;
      animation: popIn 0.3s ease;
    }
    @keyframes popIn {
      0%   { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="app-container">

    <!-- ロゴ -->
    <div class="logo-area">
      <img src="nihongo-logo.svg" alt="EdTech Gabay Logo" style="width: 100%; max-width: 320px;">
    </div>

    <!-- 言語セレクター（クリックは app.js の switchLanguage() へ） -->
    <div class="lang-selector">
      <button class="lang-btn" id="btn-lang-ja" onclick="switchLanguage('ja')">日本語</button>
      <button class="lang-btn" id="btn-lang-en" onclick="switchLanguage('en')">English</button>
      <button class="lang-btn" id="btn-lang-tl" onclick="switchLanguage('tl')">Tagalog</button>
    </div>

    <!-- レッスンピッカー（選択肢は lesson-registry.js から動的生成） -->
    <div class="lesson-selector-box">
      <select id="lesson-picker" onchange="changeLesson(this.value)"></select>
    </div>

    <!-- クリア演出 -->
    <div id="congrats-room" class="congrats-card hidden">
      🏁 Lesson Cleared! / Tapos na! ✨<br>
      <span style="font-size:14px; font-weight:500; display:block; margin-top:8px;">
        つぎの もんだいに すすむよ... 🚀
      </span>
    </div>

    <!-- クイズルーム -->
    <div id="quiz-room">
      <div class="quiz-card">
        <div class="question-title" id="question-text-box">Loading...</div>
        <button class="audio-trigger-btn" id="audio-btn" onclick="playQuestionSpeech()">🔊</button>

        <div class="options-list">
          <button class="option-btn" id="option-btn-0" onclick="checkAnswer(0)"></button>
          <button class="option-btn" id="option-btn-1" onclick="checkAnswer(1)"></button>
          <button class="option-btn" id="option-btn-2" onclick="checkAnswer(2)"></button>
        </div>
      </div>
    </div>

    <!-- ひらがなボード（第1課のみ表示） -->
    <div id="hiragana-board" class="hidden">
      <div class="question-title" style="text-align:center; margin-top:10px;">
        ひらがな表（おすと おとが でるよ！）
      </div>
      <div class="hiragana-grid" id="kana-grid-box"></div>
    </div>

  </div><!-- /.app-container -->

  <!--
    ============================================================
    スクリプト読み込み順序（順番を変えないこと）
    1. lesson-registry.js  → レッスン一覧定義（追加時はここだけ）
    2. voice-engine.js     → 音声エンジン
    3. app.js              → アプリ本体ロジック
    ============================================================
  -->
  <script src="js/lesson-registry.js"></script>
  <script src="js/voice-engine.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
