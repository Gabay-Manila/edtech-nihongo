<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 340" width="260" height="340">
  <defs>
    <radialGradient id="bodyNv" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#c8d8f0"/>
    </radialGradient>
    <radialGradient id="bellyNv" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8f0ff"/>
    </radialGradient>
    <radialGradient id="goldNv" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </radialGradient>
    <radialGradient id="patchNv" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7986cb"/>
      <stop offset="100%" stop-color="#3949ab"/>
    </radialGradient>
    <linearGradient id="collarNv" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c62828"/>
      <stop offset="50%" stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <filter id="shadowNv" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#5c7abf" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- ══════════ CAT (centered, top) ══════════ -->
  <g transform="translate(130, 8) scale(1.1)" filter="url(#shadowNv)">
    <g transform="translate(-75, 0)">

      <!-- TAIL -->
      <path d="M 108 148 Q 135 120 125 95 Q 118 78 105 90 Q 115 100 112 118 Q 108 135 100 148 Z"
            fill="url(#bodyNv)" stroke="#8fa8d0" stroke-width="1.5"/>
      <path d="M 105 90 Q 118 78 125 95 Q 120 85 110 88 Z" fill="#7986cb" stroke="#5c6bc0" stroke-width="1"/>

      <!-- BODY -->
      <ellipse cx="75" cy="130" rx="38" ry="42" fill="url(#bodyNv)" stroke="#8fa8d0" stroke-width="1.5"/>
      <ellipse cx="88" cy="118" rx="15" ry="19" fill="url(#patchNv)" opacity="0.33"/>
      <!-- BELLY -->
      <ellipse cx="75" cy="135" rx="22" ry="28" fill="url(#bellyNv)" stroke="#c8d8f0" stroke-width="1"/>

      <!-- LEFT ARM -->
      <path d="M 45 118 Q 32 125 30 140 Q 30 150 40 152 Q 50 154 52 144 Q 54 132 50 120 Z"
            fill="url(#bodyNv)" stroke="#8fa8d0" stroke-width="1.5"/>
      <ellipse cx="36" cy="149" rx="10" ry="7" fill="#e8f0ff" stroke="#8fa8d0" stroke-width="1.2"/>
      <line x1="30" y1="150" x2="31" y2="156" stroke="#7986cb" stroke-width="1" stroke-linecap="round"/>
      <line x1="36" y1="152" x2="36" y2="158" stroke="#7986cb" stroke-width="1" stroke-linecap="round"/>
      <line x1="42" y1="150" x2="41" y2="156" stroke="#7986cb" stroke-width="1" stroke-linecap="round"/>

      <!-- COIN: 学 -->
      <circle cx="50" cy="130" r="13" fill="url(#goldNv)" stroke="#f9a825" stroke-width="1.5"/>
      <text x="50" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0" font-family="serif">学</text>

      <!-- RIGHT ARM (raised) -->
      <path d="M 105 118 Q 120 108 124 90 Q 128 72 118 65 Q 108 60 104 72 Q 100 84 104 100 Q 106 110 106 120 Z"
            fill="url(#bodyNv)" stroke="#8fa8d0" stroke-width="1.5"/>
      <ellipse cx="121" cy="62" rx="10" ry="8" fill="#e8f0ff" stroke="#8fa8d0" stroke-width="1.2"/>
      <line x1="115" y1="58" x2="113" y2="52" stroke="#7986cb" stroke-width="1" stroke-linecap="round"/>
      <line x1="121" y1="56" x2="121" y2="50" stroke="#7986cb" stroke-width="1" stroke-linecap="round"/>
      <line x1="127" y1="58" x2="129" y2="52" stroke="#7986cb" stroke-width="1" stroke-linecap="round"/>

      <!-- HEAD -->
      <circle cx="75" cy="82" r="34" fill="url(#bodyNv)" stroke="#8fa8d0" stroke-width="1.8"/>
      <!-- Blue patch on head -->
      <ellipse cx="58" cy="74" rx="14" ry="17" fill="url(#patchNv)" opacity="0.38"/>

      <!-- EARS -->
      <path d="M 50 60 L 44 42 L 62 52 Z" fill="url(#bodyNv)" stroke="#8fa8d0" stroke-width="1.5"/>
      <path d="M 51 57 L 47 46 L 59 53 Z" fill="#7986cb" opacity="0.6"/>
      <path d="M 100 60 L 106 42 L 88 52 Z" fill="url(#bodyNv)" stroke="#8fa8d0" stroke-width="1.5"/>
      <path d="M 99 57 L 103 46 L 91 53 Z" fill="#b0c4e8"/>

      <!-- EYES -->
      <ellipse cx="63" cy="78" rx="7" ry="8" fill="white" stroke="#7986cb" stroke-width="1.2"/>
      <ellipse cx="64" cy="79" rx="4" ry="5" fill="#1a237e"/>
      <circle cx="65" cy="77" r="1.8" fill="white"/>
      <ellipse cx="87" cy="78" rx="7" ry="8" fill="white" stroke="#7986cb" stroke-width="1.2"/>
      <ellipse cx="88" cy="79" rx="4" ry="5" fill="#1a237e"/>
      <circle cx="89" cy="77" r="1.8" fill="white"/>

      <!-- NOSE & MOUTH -->
      <path d="M 73 89 L 75 87 L 77 89 L 75 91 Z" fill="#b0c4e8"/>
      <path d="M 75 91 Q 70 95 68 93" stroke="#7986cb" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M 75 91 Q 80 95 82 93" stroke="#7986cb" stroke-width="1.2" fill="none" stroke-linecap="round"/>

      <!-- WHISKERS -->
      <line x1="55" y1="89" x2="40" y2="86" stroke="#8fa8d0" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>
      <line x1="55" y1="91" x2="40" y2="91" stroke="#8fa8d0" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>
      <line x1="55" y1="93" x2="41" y2="96" stroke="#8fa8d0" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>
      <line x1="95" y1="89" x2="110" y2="86" stroke="#8fa8d0" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>
      <line x1="95" y1="91" x2="110" y2="91" stroke="#8fa8d0" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>
      <line x1="95" y1="93" x2="109" y2="96" stroke="#8fa8d0" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>

      <!-- COLLAR -->
      <path d="M 47 103 Q 75 115 103 103" stroke="url(#collarNv)" stroke-width="5.5" fill="none" stroke-linecap="round"/>
      <path d="M 47 103 Q 75 115 103 103" stroke="rgba(255,120,120,0.5)" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="75" cy="114" r="5.5" fill="url(#goldNv)" stroke="#f9a825" stroke-width="1.2"/>
      <line x1="75" y1="117" x2="75" y2="120" stroke="#f9a825" stroke-width="1.2"/>

      <!-- Sparkles -->
      <text x="126" y="52" font-size="11" opacity="0.6">✨</text>
      <text x="16" y="44" font-size="8" opacity="0.4">⭐</text>
    </g>
  </g>

  <!-- ══════════ LOGOTYPE (centered below cat) ══════════ -->

  <!-- EdTech -->
  <text x="130" y="228"
        text-anchor="middle"
        font-family="'Nunito', Arial Rounded MT Bold, sans-serif"
        font-size="14" font-weight="800"
        fill="#1565c0" letter-spacing="3">EdTech</text>

  <!-- NIHONGO -->
  <text x="130" y="280"
        text-anchor="middle"
        font-family="'Nunito', Arial Rounded MT Bold, sans-serif"
        font-size="46" font-weight="900"
        fill="#0d47a1" letter-spacing="2">NIHONGO</text>

  <!-- dots -->
  <circle cx="98"  cy="292" r="2.5" fill="#1565c0" opacity="0.45"/>
  <circle cx="130" cy="292" r="2.5" fill="#0d47a1" opacity="0.45"/>
  <circle cx="162" cy="292" r="2.5" fill="#1565c0" opacity="0.45"/>

  <!-- tagline -->
  <text x="130" y="316"
        text-anchor="middle"
        font-family="'Nunito', Arial, sans-serif"
        font-size="10" font-weight="700"
        fill="#1565c0" letter-spacing="2" opacity="0.7">JFT-Basic対応プラットフォーム</text>

</svg>
